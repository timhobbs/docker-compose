services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    networks:
      proxy:
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /home/tim/Public/git/docker/arr-stack/sonarr:/config
      - media_tv:/media/winshare/tv # optional
      - seagate_dl:/data/download # optional
      - seagate_complete:/data/complete # optional
    ports:
      - 8989:8989
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.sonarr.entrypoints=http
      - traefik.http.routers.sonarr.rule=Host(`sonarr.media.hobbscene.com`)
      - traefik.http.middlewares.sonarr-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.sonarr.middlewares=sonarr-https-redirect
      - traefik.http.routers.sonarr-secure.entrypoints=https
      - traefik.http.routers.sonarr-secure.rule=Host(`sonarr.media.hobbscene.com`)
      - traefik.http.routers.sonarr-secure.tls=true
      # - traefik.http.routers.sonarr-secure.tls.certresolver=cloudflare
      - traefik.http.routers.sonarr-secure.service=sonarr
      - traefik.http.routers.sonarr-secure.middlewares=authentik-media@docker
      - traefik.http.services.sonarr.loadbalancer.server.port=8989
      - homepage.group=Arr Stack
      - homepage.name=Sonarr
      - homepage.description=Automated TV series collection manager and downloader
      - homepage.href=https://sonarr.media.hobbscene.com
      - homepage.icon=sonarr
      - homepage.widget.type=sonarr
      - homepage.widget.url=http://sonarr:8989
      - homepage.widget.key=${SONARR_API_KEY}
      - homepage.widget.enableQueue=true
      - homepage.widget.fields=[wanted, queued, series]

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    networks:
      proxy:
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
