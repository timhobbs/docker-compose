    container_name: prowlarr
    networks:
      proxy:
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /home/tim/Public/git/docker/arr-stack/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.prowlarr.entrypoints=http
      - traefik.http.routers.prowlarr.rule=Host(`prowlarr.media.hobbscene.com`)
