      - /etc/localtime:/etc/localtime:ro
      - /home/tim/Public/git/docker/arr-stack/radarr:/config
      - media_movies:/media/winshare/movies # optional
      - seagate_dl:/data/download # optional
      - seagate_complete:/data/complete # optional
    ports:
      - 7878:7878
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.radarr.entrypoints=http
      - traefik.http.routers.radarr.rule=Host(`radarr.media.hobbscene.com`)
      - traefik.http.middlewares.radarr-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.radarr.middlewares=radarr-https-redirect
      - traefik.http.routers.radarr-secure.entrypoints=https
      - traefik.http.routers.radarr-secure.rule=Host(`radarr.media.hobbscene.com`)
      - traefik.http.routers.radarr-secure.tls=true
      # - traefik.http.routers.radarr-secure.tls.certresolver=cloudflare
      - traefik.http.routers.radarr-secure.service=radarr
      - traefik.http.routers.radarr-secure.middlewares=authentik-media@docker
      - traefik.http.services.radarr.loadbalancer.server.port=7878
      - homepage.group=Arr Stack
      - homepage.name=Radarr
      - homepage.description=Automated movie collection manager and downloader
      - homepage.href=https://radarr.media.hobbscene.com
      - homepage.icon=radarr
      - homepage.widget.type=radarr
