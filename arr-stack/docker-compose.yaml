      - homepage.widget.key=${RADARR_API_KEY}
      - homepage.widget.enableQueue=true
      - homepage.widget.fields=[wanted, missing, queued, movies]

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    networks:
      proxy:
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
