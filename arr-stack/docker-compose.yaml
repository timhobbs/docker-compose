volumes:
  media_music:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /media/tim/h-element-16gb/Music
  media_dl:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /media/tim/h-element-16gb/Download
  media_movies:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /media/tim/h-element-16gb/Movies
  media_tv:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /media/tim/h-element-16gb/TV
  seagate:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /media/tim/seagate500gb
  seagate_dl:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /media/tim/seagate500gb/download
  seagate_complete:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /media/tim/seagate500gb/complete

networks:
  proxy:
    external: true
