services:
  whoami:
    image: traefik/whoami
    container_name: whoami
    networks:
       proxy:
    labels:
      - traefik.enable=true
      - traefik.http.routers.whoami.entrypoints=http
      - traefik.http.routers.whoami.rule=Host(`whoami.media.hobbscene.com`)
      - traefik.http.middlewares.whoami-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.whoami.middlewares=whoami-https-redirect
      - traefik.http.routers.whoami-secure.entrypoints=https
      - traefik.http.routers.whoami-secure.rule=Host(`whoami.media.hobbscene.com`)
      - traefik.http.routers.whoami-secure.tls=true
      - traefik.http.routers.whoami-secure.service=whoami
      - traefik.http.routers.whoami-secure.middlewares=auth
      - traefik.http.services.whoami.loadbalancer.server.port=80
      - traefik.docker.network=proxy
      # - traefik.http.routers.whoami-secure.tls.certresolver=cloudflare

networks:
  proxy:
    external: true